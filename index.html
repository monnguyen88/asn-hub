es responses.","low":"More review needed. Read the key values and Objection Handling section again."}},"sales":{"scriptTitle":"Quick Consultation Scripts","scripts":[{"title":"15-second Pitch","icon":"fa-stopwatch","body":"This is ASN Cordy Protein 80+ — a high-content isolate plant protein that is very gentle on the stomach and sugar-free. It also contains Cordycepin from Cordyceps, helping customers add enough protein while supporting endurance and recovery."},{"title":"Whey-switch Opening","icon":"fa-comments","body":"If you often feel bloated or get acne when using whey, try rotating with this Plant Protein line. It is much gentler because it has no lactose, still reaches 80%+ protein, and adds endurance-support nutrients."},{"title":"Closing Focus","icon":"","body":"It is not just plant protein powder; it is a clean, easy-to-digest protein solution with added Cordycepin value, suitable for consistent daily use.","highlight":true}],"rulesTitle":"Consultation Rules (DO & DON'T)","doTitle":"DO","dontTitle":"DON'T","doItems":["Emphasize 80%+ protein, easy digestion, and sugar-free positioning.","Explain Cordycepin as a valuable plus for endurance support.","Say “multi-source protein blend” instead of a vague “mixed powder.”","Recommend that customers with special medical conditions consult a doctor first."],"dontItems":["<strong>Never</strong> claim that the product cures disease.","Do not overpromise muscle gain or health transformation.","Do not call it common cereal powder or bean powder.","Do not aggressively put whey down; only explain the difference."]},"footer":{"title":"5 Must-remember Points","items":["<span class='text-asn-red font-bold'>1.</span> Correct name: <strong>ASN Cordy Protein 80+</strong> (do not shorten it casually).","<span class='text-asn-red font-bold'>2.</span> Nature: High-content isolate plant protein (80%+).","<span class='text-asn-red font-bold'>3.</span> Highlight: <strong>Multi-source protein blend</strong> + <strong>Cordyceps/Cordycepin</strong>.","<span class='text-asn-red font-bold'>4.</span> User feel: Gentle on the stomach, lactose-free, sugar-free.","<span class='text-asn-red font-bold'>5.</span> Safety: No disease-cure claims; serious conditions need medical advice."],"cta":"Understand Right - Consult Right - Sell with Confidence","note":"Internal training material. Updated according to standard guidelines."}}},"shared":{"objections":{"vi":[{"q":"Protein thực vật có đủ tốt để tăng cơ không?","a":"Đủ tốt. ASN Cordy Protein 80+ dùng đạm Isolate hàm lượng cao tổng hợp đa nguồn để cân bằng acid amin. Nếu dùng đủ lượng và tập luyện, sản phẩm hỗ trợ phục hồi và phát triển cơ bắp rất hiệu quả, không thua kém các loại đạm Whey khác."},{"q":"Đậu nành có ảnh hưởng hormone nam giới không?","a":"Không. Phytoestrogen trong đậu nành có hoạt tính yếu hơn nội tiết tố người hàng nghìn lần. Hơn nữa, ASN Cordy Protein 80+ sử dụng nguồn đạm đã phân lập (Isolate) và tổng hợp đa nguồn, nam giới hoàn toàn yên tâm sử dụng ở mức hợp lý mà không lo ảnh hưởng hormone."},{"q":"Sản phẩm này có thay thế bữa ăn không?","a":"Không thay thế hoàn toàn bữa ăn. Sản phẩm tập trung cung cấp đạm tinh khiết, không đủ carb/fat của bữa chính. Tuy nhiên, khách có thể dùng làm 'bữa phụ' tiện lợi để bổ sung đạm lành mạnh, không đường."},{"q":"Có dùng được mỗi ngày không?","a":"Hoàn toàn có thể. Do đặc tính không lactose và nhẹ bụng, sản phẩm rất lý tưởng để duy trì bổ sung lượng đạm thiếu hụt trong chế độ ăn hằng ngày mà không làm quá tải hệ tiêu hóa."},{"q":"Khác gì so với whey?","a":"Whey hấp thu nhanh nhưng dễ gây đầy bụng, nổi mụn với người bất dung nạp lactose. ASN Cordy Protein 80+ khác biệt: 100% đạm thực vật nhẹ bụng, không lactose, và ĐẶC BIỆT có thêm Cordycepin hỗ trợ sức bền – điều Whey không có. Rất hợp để luân phiên/thay thế."},{"q":"Cordycepin có tác dụng gì?","a":"Nếu protein để nuôi cơ, thì Cordycepin (từ Đông trùng hạ thảo) hỗ trợ sức bền, giảm mệt mỏi và phục hồi thể trạng tổng thể. Lợi ích kép tuyệt vời cho người tập luyện và làm việc căng thẳng."},{"q":"Có phải thuốc không?","a":"Tuyệt đối không. Đây là thực phẩm bổ sung dinh dưỡng (đạm thực vật cao cấp), giúp bù đắp protein thiếu hụt và hỗ trợ thể trạng, không có tác dụng thay thế thuốc chữa bệnh."},{"q":"Người có bệnh nền có dùng được không?","a":"Sản phẩm lành tính, không đường. NHƯNG với người có bệnh lý đặc biệt (thận mạn, gan nặng, ung thư, tiểu đường đang dùng thuốc), nguyên tắc là: Cần hỏi bác sĩ hoặc chuyên gia dinh dưỡng để biết khẩu phần đạm phù hợp trước khi dùng thường xuyên."},{"q":"Sản phẩm không đường thì có khó uống không?","a":"Không. Sản phẩm được thiết kế để dễ uống hằng ngày nhưng vẫn không dùng đường kính. Khi tư vấn, hãy nhấn mạnh lợi ích kiểm soát vóc dáng, hạn chế nạp đường dư thừa và phù hợp khách đang eat clean."},{"q":"Pha có cặn dưới đáy thì có phải hàng lỗi không?","a":"Không phải lỗi. Đạm thực vật dạng bột mịn có thể có độ lắng tự nhiên. Hướng dẫn khách dùng bình lắc, lắc kỹ và uống ngay sau khi pha. Việc có ít cặn không làm mất chất lượng sản phẩm."},{"q":"Người tiểu đường có dùng được không?","a":"Sản phẩm không đường, nhưng khách tiểu đường đang điều trị vẫn nên hỏi bác sĩ hoặc chuyên gia dinh dưỡng để kiểm soát tổng khẩu phần đạm và năng lượng trong ngày. Không tư vấn thay thế thuốc hoặc phác đồ điều trị."},{"q":"Có thể dùng chung hoặc luân phiên với Whey không?","a":"Có thể. Đây là lựa chọn luân phiên tốt cho ngày khách muốn nhẹ bụng, tránh lactose hoặc muốn thêm giá trị hỗ trợ sức bền từ Cordyceps. Không cần hạ thấp Whey, chỉ cần nói rõ điểm khác biệt của từng dòng."},{"q":"Uống trước tập hay sau tập tốt hơn?","a":"Sau tập hoặc giữa các bữa là cách dùng dễ tư vấn nhất để bổ sung đạm và hỗ trợ phục hồi. Nếu khách thiếu đạm trong ngày, có thể dùng như bữa phụ. Quan trọng là tổng protein cả ngày, không chỉ thời điểm uống."},{"q":"Khách nói giá cao hơn bột đậu/bột ngũ cốc thì xử lý sao?","a":"Giải thích rằng đây là protein isolate hàm lượng cao 80%+, không phải bột ngũ cốc nhiều tinh bột. Giá trị nằm ở lượng đạm rõ ràng, công thức đa nguồn, nhẹ bụng, không lactose và có thêm Cordyceps/Cordycepin."},{"q":"Người lớn tuổi dùng có phù hợp không?","a":"Phù hợp với người lớn tuổi cần bổ sung đạm nhẹ bụng, không lactose và không đường. Tuy nhiên nếu có bệnh thận, gan, đang dùng thuốc hoặc có chỉ định dinh dưỡng riêng thì phải hỏi bác sĩ trước khi dùng đều."},{"q":"Phụ nữ sau sinh hoặc đang cho con bú có dùng được không?","a":"Có thể quan tâm vì nhu cầu dinh dưỡng cao, nhưng nếu đang cho con bú hoặc vừa sinh, cần khuyến nghị hỏi bác sĩ trước khi dùng thường xuyên để đảm bảo phù hợp với cơ địa, khẩu phần và tình trạng sức khỏe."}],"en":[{"q":"Is plant protein good enough for muscle gain?","a":"Yes. ASN Cordy Protein 80+ uses high-content isolate protein from multiple sources to balance amino acids. When intake and training are adequate, it can effectively support recovery and muscle development, comparable to other protein options."},{"q":"Does soy affect male hormones?","a":"No. Soy phytoestrogens are much weaker than human hormones. ASN Cordy Protein 80+ also uses isolated protein and a multi-source blend, so men can use it reasonably without worrying about hormone effects."},{"q":"Can this product replace a meal?","a":"It should not fully replace a meal. The product focuses on providing clean protein and does not contain the full carbs/fats of a main meal. Customers can use it as a convenient snack to add healthy, sugar-free protein."},{"q":"Can it be used every day?","a":"Yes. Because it is lactose-free and gentle on the stomach, it is suitable for maintaining daily protein intake without overloading digestion."},{"q":"How is it different from whey?","a":"Whey absorbs quickly but may cause bloating or acne for people sensitive to lactose. ASN Cordy Protein 80+ is 100% plant-based, gentle, lactose-free, and notably includes Cordycepin for endurance support — something regular whey does not have. It is suitable for rotation or replacement."},{"q":"What does Cordycepin do?","a":"If protein supports muscle nourishment, Cordycepin from Cordyceps supports endurance, helps reduce fatigue, and supports overall recovery. This creates a dual benefit for training and high-stress lifestyles."},{"q":"Is it medicine?","a":"Absolutely not. It is a nutrition supplement — a premium plant protein — that helps fill protein gaps and support overall condition. It does not replace medication or medical treatment."},{"q":"Can customers with underlying conditions use it?","a":"The product is sugar-free and generally gentle. However, for customers with special medical conditions such as chronic kidney disease, severe liver disease, cancer, or diabetes under treatment, the rule is to consult a doctor or nutrition professional for the appropriate protein intake before regular use."},{"q":"If it is sugar-free, is it hard to drink?","a":"No. It is designed for daily drinkability without using refined sugar. When consulting, emphasize body-shape control, reduced excess sugar intake, and suitability for eat-clean customers."},{"q":"If residue settles at the bottom, is it defective?","a":"No. Fine plant protein powder may naturally settle. Advise customers to use a shaker, shake well, and drink soon after mixing. A small amount of residue does not reduce product quality."},{"q":"Can people with diabetes use it?","a":"The product is sugar-free, but customers with diabetes under treatment should still consult a doctor or nutrition professional to manage total daily protein and energy intake. Do not position it as a replacement for medication or treatment plans."},{"q":"Can it be used together with or rotated with whey?","a":"Yes. It is a good rotation option for days when customers want something gentler, want to avoid lactose, or want the added endurance-support value from Cordyceps. There is no need to criticize whey; simply explain the difference between product types."},{"q":"Is it better before or after training?","a":"Post-workout or between meals is the easiest recommendation for protein intake and recovery support. If customers are short on daily protein, they can use it as a snack. Total daily protein matters more than timing alone."},{"q":"What if customers say it costs more than bean or cereal powder?","a":"Explain that this is a high-content 80%+ protein isolate, not high-starch cereal powder. The value lies in clear protein content, multi-source formula, gentle digestion, lactose-free positioning, and added Cordyceps/Cordycepin."},{"q":"Is it suitable for older adults?","a":"It can suit older adults who need a gentle, lactose-free, sugar-free protein source. However, if they have kidney/liver disease, use medication, or have specific nutrition instructions, they should consult a doctor before regular use."},{"q":"Can postpartum or breastfeeding women use it?","a":"They may be interested because nutrition needs are higher, but if they are breastfeeding or recently gave birth, recommend consulting a doctor before regular use to ensure it fits their body condition, diet, and health status."}]},"qaCategories":{"vi":[{"id":"all","name":"Tất cả"},{"id":"cat1","name":"Định vị & Khác biệt"},{"id":"cat2","name":"Macro & Liều dùng"},{"id":"cat3","name":"Amino Acid & Cơ"},{"id":"cat4","name":"So sánh Whey"},{"id":"cat5","name":"Cordyceps"},{"id":"cat6","name":"Tiêu hóa & Cảm quan"},{"id":"cat7","name":"An toàn Sức khỏe"}],"en":[{"id":"all","name":"All"},{"id":"cat1","name":"Positioning & Difference"},{"id":"cat2","name":"Macros & Usage"},{"id":"cat3","name":"Amino Acids & Muscle"},{"id":"cat4","name":"Whey Comparison"},{"id":"cat5","name":"Cordyceps"},{"id":"cat6","name":"Digestion & User Feel"},{"id":"cat7","name":"Health & Safety"}]},"qa":{"vi":[{"id":1,"cat":"cat1","q":"ASN Cordy Protein 80+ là sản phẩm gì?","a":"Là dòng đạm thực vật isolate hàm lượng cao, phát triển theo hướng bổ sung protein hằng ngày kết hợp hỗ trợ sức bền, phục hồi. Điểm khác biệt là công thức Protein 80+ tổng hợp đa nguồn và có Đông trùng hạ thảo/Cordycepin."},{"id":2,"cat":"cat1","q":"Khác gì so với đạm thực vật thông thường?","a":"Nổi bật ở 4 điểm: Hàm lượng protein cao 80+, dùng nguồn đạm isolate, tổng hợp từ nhiều nguồn (pea, rice, soy) để cân bằng acid amin, và có thêm Cordyceps/Cordycepin hỗ trợ sức bền (đa số plant protein khác không có)."},{"id":3,"cat":"cat1","q":"Tại sao không gọi là bột ngũ cốc hay bột đậu?","a":"Vì bột ngũ cốc thường nhiều tinh bột, đạm thấp, khó tính macro. ASN Cordy Protein 80+ là protein isolate hàm lượng cao, cung cấp lượng đạm rõ ràng, phù hợp cho người bổ sung protein có mục tiêu."},{"id":4,"cat":"cat1","q":"Giá trị cốt lõi nên tư vấn như thế nào?","a":"Đạm thực vật cao cấp + nhẹ bụng + không lactose + hỗ trợ sức bền/phục hồi nhờ Cordyceps. Phù hợp người tập luyện, bổ sung đạm hằng ngày, người ngại đầy bụng khi dùng whey."},{"id":5,"cat":"cat2","q":"Hàm lượng protein thực nhận mỗi khẩu phần?","a":"Với hàm lượng ~82.7%, mỗi 25g bột cung cấp khoảng 20-21g protein. Dùng 30g bột nhận khoảng 24-25g. Giúp tính macro rõ ràng."},{"id":6,"cat":"cat2","q":"Một khẩu phần nên dùng bao nhiêu gram?","a":"Cơ bản 25-30g/lần. Người tập nặng cần tối ưu phục hồi có thể cân nhắc 30-40g/ngày tùy tổng khẩu phần ăn."},{"id":7,"cat":"cat2","q":"Có nên dùng 1-2 lần/ngày không?","a":"Có thể, tùy nhu cầu. Người thiếu đạm dùng 1 lần/ngày; người tập đều dùng sau tập/giữa các bữa. Tuy nhiên cần tính tổng protein cả ngày, không dùng kiểu 'càng nhiều càng tốt'."},{"id":8,"cat":"cat2","q":"Sản phẩm có liều tối đa mỗi ngày để an toàn gan thận không?","a":"Người khỏe mạnh dùng như nguồn đạm hằng ngày. Người bệnh thận mạn, gan nặng cần hỏi bác sĩ. Liều dùng dựa trên nhu cầu đạm cá nhân, không dùng tùy tiện quá mức."},{"id":9,"cat":"cat3","q":"Hồ sơ acid amin có gì nổi bật?","a":"Không phụ thuộc 1 nguồn. Công thức tổng hợp từ đậu nành, đậu hà lan, gạo giúp bù trừ thế mạnh acid amin, tạo hồ sơ cân bằng hơn đạm thực vật đơn nguồn."},{"id":10,"cat":"cat3","q":"Leucine có đủ hỗ trợ tổng hợp cơ không?","a":"Nếu có ~5.4g leucine/100g bột, thì 30g bột cung cấp ~1.62g leucine; 40g bột cung cấp ~2.16g. Khẩu phần 30-40g/ngày đủ hỗ trợ phục hồi và tổng hợp cơ tốt."},{"id":11,"cat":"cat3","q":"Leucine thấp hơn whey thì có kém hiệu quả không?","a":"Whey lợi thế hấp thu nhanh, nhưng ASN Cordy Protein 80+ lợi thế nhẹ bụng, dễ dùng lâu dài, có Cordycepin hỗ trợ phục hồi. Nếu dùng đủ lượng đạm trong ngày, vẫn hỗ trợ tốt việc duy trì/phát triển cơ."},{"id":12,"cat":"cat3","q":"Tổng EAA/BCAA có đủ cho người tập không?","a":"Đủ. Điểm mạnh là công thức đa nguồn và khả năng dùng đều đặn, nhẹ bụng. Tập nặng có thể tăng khẩu phần hoặc kết hợp ăn uống chính."},{"id":13,"cat":"cat3","q":"Chênh lệch protein 82.7% so với whey 90% làm giảm tăng cơ không?","a":"Không đáng kể nếu điều chỉnh đủ khẩu phần hằng ngày. Whey hấp thu nhanh; sản phẩm này nổi bật vì nhẹ bụng, thực vật cao cấp và có giá trị phục hồi từ Cordyceps."},{"id":14,"cat":"cat4","q":"Có thể thay thế whey không?","a":"Có, đặc biệt với người không dung nạp lactose, đầy bụng, ăn chay, hoặc cần đạm nhẹ bụng. Là lựa chọn thay thế/luân phiên cao cấp, không phải 'bản sao của whey'."},{"id":15,"cat":"cat4","q":"Khuyên khách bỏ hẳn whey sang sản phẩm này?","a":"Không ép bỏ. Khuyên dùng như lựa chọn cao cấp luân phiên để nhẹ bụng hơn, hoặc dùng vào ngày muốn tránh lactose, đồng thời nhận thêm lợi ích sức bền từ Cordyceps."},{"id":16,"cat":"cat4","q":"Phù hợp nhóm khách nào hơn whey?","a":"Người dễ đầy hơi khi dùng whey, không dung nạp lactose, người ăn chay/bán chay, người lớn tuổi cần đạm nhẹ bụng, người cần hỗ trợ sức bền từ Cordycepin."},{"id":17,"cat":"cat5","q":"Cordyceps/Cordycepin có vai trò gì?","a":"Protein hỗ trợ cơ, còn Cordyceps hỗ trợ sức bền, giảm mệt mỏi, phục hồi thể trạng. Lợi ích kép tạo sự khác biệt lớn với plant protein thường."},{"id":18,"cat":"cat5","q":"Hàm lượng Cordycepin?","a":"Khoảng 80-155 mg/kg bột (tùy lô). Quan trọng là có thêm hoạt chất sinh học hỗ trợ từ Đông trùng hạ thảo mà protein thường không có."},{"id":19,"cat":"cat5","q":"Cordyceps có giúp tăng cơ trực tiếp không?","a":"Không trực tiếp như protein. Vai trò của nó là hỗ trợ năng lượng, sức bền, phục hồi tổng thể, bổ trợ cho nền protein 80+ phát huy hiệu quả."},{"id":20,"cat":"cat5","q":"Dùng bao lâu cảm nhận được hiệu quả Cordyceps?","a":"Cần dùng đều đặn, không tức thì như caffeine. Cảm nhận 2 lớp: đủ đạm phục hồi ngắn hạn sau tập, và cải thiện sức bền/thể trạng khi dùng dài hạn."},{"id":21,"cat":"cat6","q":"Phù hợp người không dung nạp lactose không?","a":"Rất phù hợp. 100% đạm thực vật, không sữa bò, khắc phục được tình trạng đầy hơi, đau bụng khi dùng whey."},{"id":22,"cat":"cat6","q":"Hấp thu chậm hơn whey có lợi gì?","a":"Tốc độ ổn định là lợi thế cho người dùng hằng ngày, người lớn tuổi, hệ tiêu hóa nhạy cảm. Dễ duy trì lâu dài."},{"id":23,"cat":"cat6","q":"Người tiểu đường dùng được không?","a":"Sản phẩm không đường, dùng chất ngọt an toàn, đường thấp. NHƯNG đang điều trị cần hỏi bác sĩ/chuyên gia trước khi dùng thường xuyên."},{"id":24,"cat":"cat6","q":"Tại sao pha có cặn dưới đáy?","a":"Đặc tính tự nhiên của đạm thực vật dạng bột mịn. Nên dùng bình lắc kỹ và uống ngay. Không ảnh hưởng chất lượng."},{"id":25,"cat":"cat6","q":"Bảo quản thế nào?","a":"Nơi khô ráo, dưới 30 độ C. Đóng kín nắp, dùng muỗng khô, dùng trong 30-60 ngày. Không để tủ lạnh tránh ngưng tụ ẩm làm vón bột."},{"id":26,"cat":"cat7","q":"Nam giới uống đậu nành bị nữ hóa?","a":"Không. Phytoestrogen hoạt tính cực yếu. Sản phẩm lại dùng đạm Isolate tổng hợp đa nguồn, nam giới dùng hợp lý không lo nữ hóa."},{"id":27,"cat":"cat7","q":"Lo ngại ung thư kiêng đạm đậu nành?","a":"Người khỏe bình thường an toàn. Người đang điều trị ung thư, bệnh nội tiết cần hỏi bác sĩ. Sản phẩm tổng hợp đa nguồn, nhưng có bệnh lý thì cần tư vấn cá nhân hóa."},{"id":28,"cat":"cat7","q":"Người có u, hạch dùng được không?","a":"Cơ địa bình thường không kiêng thì có thể dùng bổ sung. Nếu có u/hạch bất thường hoặc đang theo dõi ung thư: HỎI BÁC SĨ trước. Không hù dọa, không cam kết bừa."},{"id":29,"cat":"cat7","q":"Giải thích khách sợ đậu nành?","a":"Đậu nành bị hiểu lầm do phytoestrogen. Sản phẩm dùng đạm isolate tổng hợp nhiều loại đạm. Rủi ro sức khỏe thường do lối sống (rượu, thuốc, lười vận động) hơn là đạm đậu nành."},{"id":30,"cat":"cat7","q":"Ai cần thận trọng khi dùng?","a":"Bệnh thận mạn, gan nặng, ung thư, tự miễn, dùng thuốc chống đông, dị ứng đậu nành/đậu hà lan, phụ nữ có thai/cho con bú -> Hỏi bác sĩ trước. Người khỏe mạnh dùng bình thường."}],"en":[{"id":1,"cat":"cat1","q":"What is ASN Cordy Protein 80+?","a":"It is a high-content isolate plant protein designed for daily protein supplementation, endurance support, and recovery. The key difference is its multi-source Protein 80+ formula plus Cordyceps/Cordycepin."},{"id":2,"cat":"cat1","q":"How is it different from regular plant protein?","a":"It stands out in four ways: 80%+ high protein content, isolate protein sources, a multi-source blend (pea, rice, soy) to balance amino acids, and added Cordyceps/Cordycepin for endurance support, which most plant proteins do not include."},{"id":3,"cat":"cat1","q":"Why should we not call it cereal powder or bean powder?","a":"Cereal powders are usually high in starch, low in protein, and hard to track for macros. ASN Cordy Protein 80+ is a high-content protein isolate with clear protein delivery for goal-oriented users."},{"id":4,"cat":"cat1","q":"How should the core value be presented?","a":"Premium plant protein + gentle digestion + lactose-free + endurance/recovery support from Cordyceps. It suits training users, daily protein supplementation, and customers who feel bloated with whey."},{"id":5,"cat":"cat2","q":"How much actual protein is in each serving?","a":"At around 82.7% protein, 25g of powder provides about 20-21g protein. A 30g serving provides around 24-25g protein, making macro tracking clear."},{"id":6,"cat":"cat2","q":"How many grams should one serving be?","a":"A basic serving is 25-30g. Heavy trainers who need more recovery support may consider 30-40g/day depending on total diet."},{"id":7,"cat":"cat2","q":"Can customers use it 1-2 times per day?","a":"Yes, depending on needs. People lacking protein may use it once daily; regular trainers can use it post-workout or between meals. Total daily protein should be calculated rather than assuming more is always better."},{"id":8,"cat":"cat2","q":"Is there a maximum daily dose for liver/kidney safety?","a":"Healthy people can use it as a daily protein source. Customers with chronic kidney disease or severe liver disease should consult a doctor. Dosage should follow personal protein needs, not excessive random use."},{"id":9,"cat":"cat3","q":"What stands out in its amino acid profile?","a":"It does not depend on one source. The formula combines soy, pea, and rice protein to complement amino acid strengths and create a more balanced profile than single-source plant protein."},{"id":10,"cat":"cat3","q":"Is leucine sufficient to support muscle protein synthesis?","a":"If the product has around 5.4g leucine per 100g powder, then 30g provides about 1.62g leucine and 40g provides about 2.16g. A 30-40g/day portion can support recovery and muscle synthesis well."},{"id":11,"cat":"cat3","q":"If leucine is lower than whey, is it less effective?","a":"Whey has fast absorption as an advantage, but ASN Cordy Protein 80+ is gentler, easier for long-term use, and includes Cordycepin for recovery support. With enough total daily protein, it can still support muscle maintenance and development."},{"id":12,"cat":"cat3","q":"Are total EAA/BCAA levels enough for training users?","a":"Yes. Its strengths are the multi-source formula and consistent, easy digestion. Heavy trainers can increase serving size or combine it with regular meals."},{"id":13,"cat":"cat3","q":"Does 82.7% protein versus 90% whey reduce muscle gain?","a":"Not meaningfully if daily intake is adjusted. Whey absorbs quickly; this product stands out for gentle digestion, premium plant-based positioning, and Cordyceps-based recovery value."},{"id":14,"cat":"cat4","q":"Can it replace whey?","a":"Yes, especially for people who are lactose intolerant, feel bloated, follow vegetarian/flexitarian diets, or need a gentler protein. It is a premium replacement or rotation option, not a whey copy."},{"id":15,"cat":"cat4","q":"Should we tell customers to quit whey completely?","a":"No need to force switching. Recommend it as a premium rotation option for a gentler feel, for days when they want to avoid lactose, and for added endurance support from Cordyceps."},{"id":16,"cat":"cat4","q":"Which groups may prefer it over whey?","a":"People who bloat with whey, people with lactose intolerance, vegetarian/flexitarian customers, older adults needing gentle protein, and customers who want endurance support from Cordycepin."},{"id":17,"cat":"cat5","q":"What is the role of Cordyceps/Cordycepin?","a":"Protein supports muscle, while Cordyceps supports endurance, fatigue reduction, and overall recovery. This dual benefit creates a major difference from regular plant protein."},{"id":18,"cat":"cat5","q":"What is the Cordycepin content?","a":"Around 80-155 mg/kg powder depending on batch. The important point is that it includes bioactive support from Cordyceps that regular protein powders usually do not have."},{"id":19,"cat":"cat5","q":"Does Cordyceps directly build muscle?","a":"Not directly like protein. Its role is to support energy, endurance, and overall recovery, complementing the Protein 80+ base."},{"id":20,"cat":"cat5","q":"How long does it take to feel Cordyceps benefits?","a":"It requires consistent use and is not instant like caffeine. Customers may feel two layers: short-term recovery from sufficient protein after training, and longer-term endurance/body-condition support."},{"id":21,"cat":"cat6","q":"Is it suitable for lactose-intolerant people?","a":"Very suitable. It is 100% plant-based, contains no cow’s milk, and helps avoid bloating or stomach discomfort that some customers experience with whey."},{"id":22,"cat":"cat6","q":"What is the benefit of slower absorption than whey?","a":"A steadier digestion speed is beneficial for daily users, older adults, and people with sensitive digestion. It is easier to maintain long-term."},{"id":23,"cat":"cat6","q":"Can people with diabetes use it?","a":"It is sugar-free, uses safe sweeteners, and is low in sugar. However, customers under treatment should consult a doctor or professional before regular use."},{"id":24,"cat":"cat6","q":"Why is there residue after mixing?","a":"This is a natural characteristic of fine plant protein powder. Use a shaker, shake well, and drink soon after mixing. It does not affect quality."},{"id":25,"cat":"cat6","q":"How should it be stored?","a":"Store in a dry place below 30°C. Close the lid tightly, use a dry scoop, and consume within 30-60 days. Do not refrigerate, as condensation can cause clumping."},{"id":26,"cat":"cat7","q":"Will soy protein feminize men?","a":"No. Phytoestrogens are extremely weak. The product also uses isolate protein from multiple sources, so reasonable use does not cause feminization."},{"id":27,"cat":"cat7","q":"What about cancer concerns and soy protein?","a":"It is safe for generally healthy people. Customers undergoing cancer treatment or endocrine-related treatment should consult a doctor. Because medical conditions require personalized advice."},{"id":28,"cat":"cat7","q":"Can someone with lumps or swollen lymph nodes use it?","a":"If they are otherwise healthy and not instructed to avoid it, they may use it as a supplement. If they have abnormal lumps/lymph nodes or are being monitored for cancer, they must consult a doctor first. Do not scare them or make careless promises."},{"id":29,"cat":"cat7","q":"How do we explain it to customers afraid of soy?","a":"Soy is often misunderstood because of phytoestrogens. This product uses isolate protein from multiple sources. Health risks usually come more from lifestyle factors such as alcohol, smoking, and inactivity than from soy protein itself."},{"id":30,"cat":"cat7","q":"Who should be cautious when using it?","a":"People with chronic kidney disease, severe liver disease, cancer, autoimmune conditions, those using anticoagulants, people allergic to soy/pea, and pregnant/breastfeeding women should consult a doctor first. Healthy users can use it normally."}]},"quiz":{"vi":[{"q":"ASN Cordy Protein 80+ bản chất là sản phẩm gì?","options":["Bột ngũ cốc tăng cân","Đạm thực vật Isolate hàm lượng cao","Thuốc phục hồi cơ bắp","Đạm Whey pha Đông trùng hạ thảo"],"ans":1,"exp":"Đúng. Đây là đạm thực vật Isolate hàm lượng cao (80%+), không phải bột ngũ cốc hay thuốc."},{"q":"Đặc điểm nào KHÔNG đúng khi nói về công thức của sản phẩm?","options":["Tổng hợp đa nguồn: Pea, Rice, Soy","Không chứa Lactose","Sử dụng đường kính để tạo vị ngon","Bổ sung Cordyceps/Cordycepin"],"ans":2,"exp":"Đúng. Sản phẩm KHÔNG ĐƯỜNG, sử dụng chất tạo ngọt an toàn, phù hợp kiểm soát cân nặng."},{"q":"Khách hàng muốn dùng ASN Cordy Protein 80+ thay thế hoàn toàn 3 bữa ăn chính có được không?","options":["Được, vì nó đủ chất","Không, chỉ nên dùng làm bữa phụ bổ sung đạm","Được nếu uống gấp đôi liều","Không, vì đạm thực vật không tốt"],"ans":1,"exp":"Sản phẩm cung cấp đạm tinh khiết, không đủ carb/fat/vi chất để thay thế bữa ăn chính. Chỉ dùng làm bữa phụ."},{"q":"Vai trò chính của thành phần Cordyceps/Cordycepin trong sản phẩm là gì?","options":["Kích thích tăng cơ bắp trực tiếp như Steroid","Hỗ trợ tiêu hóa tốt hơn","Hỗ trợ sức bền, phục hồi và thể trạng","Làm bột dễ tan hơn"],"ans":2,"exp":"Cordycepin đóng vai trò hỗ trợ sức bền, giảm mệt mỏi và phục hồi, kết hợp với Protein tạo thành lợi ích kép."},{"q":"Khách nam lo lắng uống đạm đậu nành bị 'nữ hóa', bạn tư vấn thế nào?","options":["Khuyên đổi sang uống Whey","Giải thích Phytoestrogen hoạt tính rất yếu, an toàn cho nam","Nói rằng chỉ nữ mới nên uống","Sản phẩm đã lọc sạch 100% Phytoestrogen"],"ans":1,"exp":"Phytoestrogen trong đậu nành cực kỳ yếu, không gây nữ hóa. Hơn nữa sản phẩm tổng hợp từ nhiều nguồn đạm (Pea, Rice, Soy)."},{"q":"Khi gặp khách hàng đang bị bệnh thận mạn hoặc ung thư muốn mua sản phẩm, bạn nên làm gì?","options":["Chốt sale ngay vì là đồ thực vật rất lành","Cam kết sản phẩm chữa được bệnh","Khuyên khách nhất định phải hỏi ý kiến bác sĩ trước","Bảo khách tự giảm nửa liều là được"],"ans":2,"exp":"Nguyên tắc an toàn: Có bệnh lý đặc biệt/đang dùng thuốc phải hỏi ý kiến bác sĩ trước khi dùng thường xuyên."},{"q":"Lợi thế lớn nhất của sản phẩm này so với Whey khi tư vấn tại Gym là gì?","options":["Hấp thu nhanh hơn Whey","Nhẹ bụng, không lactose, có Cordycepin hỗ trợ sức bền","Giá rẻ hơn rất nhiều","Có nhiều vị ngon hơn"],"ans":1,"exp":"Lợi thế tư vấn chốt sale là tính nhẹ bụng, không lactose (phù hợp ai uống whey bị đầy hơi/mụn) và có thêm điểm cộng từ Cordycepin."},{"q":"Sản phẩm có giúp cảm nhận năng lượng bùng nổ tức thì như Pre-workout (Caffeine) không?","options":["Có, uống xong sung ngay","Không, Cordyceps hỗ trợ sức bền cần dùng đều đặn","Có, nếu uống 2 muỗng","Chỉ sung khi uống lúc đói"],"ans":1,"exp":"Cordyceps không kích thích hệ thần kinh tức thì như Caffeine. Cần duy trì đều để thấy sức bền và sự phục hồi tăng lên."},{"q":"Tại sao sản phẩm được gọi là 'Tổng hợp đa nguồn' (Blend)?","options":["Vì có cả đạm thực vật và động vật","Vì kết hợp Đậu Hà Lan, Gạo, Đậu nành để tối ưu Acid Amin","Vì có nhiều mùi vị","Vì pha trộn với ngũ cốc"],"ans":1,"exp":"Kết hợp Pea, Rice, Soy giúp bù trừ các acid amin thiết yếu cho nhau, tạo hồ sơ acid amin cân bằng hơn."},{"q":"Câu nào dưới đây là 'DON'T' (Không được phép nói) khi tư vấn?","options":["Sản phẩm giúp bổ sung đạm thực vật hàm lượng cao","Sản phẩm nhẹ bụng, rất hợp cho người sợ lactose","Uống sản phẩm này sẽ chữa khỏi bệnh suy nhược","Có thể dùng luân phiên với Whey"],"ans":2,"exp":"Tuyệt đối KHÔNG claim y tế (không nói sản phẩm chữa bệnh). Đây là Thực phẩm bổ sung."}],"en":[{"q":"What is ASN Co         function getStorageItem(key) {
            try { return window.localStorage ? window.localStorage.getItem(key) : null; } catch (err) { return null; }
        }
        function setStorageItem(key, value) {
            try { if (window.localStorage) window.localStorage.setItem(key, value); } catch (err) {}
        }
        function getPage() { return DATA.page[currentLang]; }
        function getShared(type) { return DATA.shared[type][currentLang]; }
        function setHTML(id, html) { const el = document.getElementById(id); if (el) el.innerHTML = html; }
        function setText(id, text) { const el = document.getElementById(id); if (el) el.textContent = text; }
        function escapeRegExp(text) { return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
        function escapeHtml(value) {
            return String(value).replace(/[&<>'"]/g, char => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;'}[char]));
        }
        function interpolate(template, values) {
            return template.replace(/\{(\w+)\}/g, (_, key) => values[key] ?? '');
        }
        function highlightText(text, keyword) {
            const safeText = escapeHtml(text);
            const cleanKeyword = keyword.trim();
            if (!cleanKeyword) return safeText;
            const regex = new RegExp(`(${escapeRegExp(escapeHtml(cleanKeyword))})`, 'gi');
            return safeText.replace(regex, '<mark>$1</mark>');
        }

            initTheme();

        function initTheme() {
            const savedTheme = getStorageItem('asn-color-theme');
            if (savedTheme === 'light') document.documentElement.classList.remove('dark');
            else document.documentElement.classList.add('dark');
        }

        function initLanguage() {
            const savedLang = getStorageItem('asn-lang');
            currentLang = savedLang === 'en' ? 'en' : 'vi';
        }

        function initEvents() {
            const themeBtn = document.getElementById('theme-toggle');
            if (themeBtn) {
                themeBtn.addEventListener('click', () => {
                    document.documentElement.classList.toggle('dark');
                    setStorageItem('asn-color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                });
            }

            const homeBrandBtn = document.getElementById('home-brand-btn');
            if (homeBrandBtn) homeBrandBtn.addEventListener('click', goToHomePage);

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            });

            const backToTopBtn = document.getElementById('back-to-top');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 500) {
                    backToTopBtn.classList.remove('opacity-0', 'invisible');
                    backToTopBtn.classList.add('opacity-100', 'visible');
                } else {
                    backToTopBtn.classList.add('opacity-0', 'invisible');
                    backToTopBtn.classList.remove('opacity-100', 'visible');
                }
            });
            backToTopBtn.addEventListener('click', () => window.scrollTo(0, 0));

            const search = document.getElementById('qa-search');
            search.addEventListener('input', (e) => {
                currentSearchTerm = e.target.value.toLowerCase();
                renderQAList();
            });
            document.getElementById('btn-expand-all').addEventListener('click', () => {
                document.querySelectorAll('#qa-container .accordion-item').forEach(el => el.classList.add('active'));
            });
            document.getElementById('btn-collapse-all').addEventListener('click', () => {
                document.querySelectorAll('#qa-container .accordion-item').forEach(el => el.classList.remove('active'));
            });

            document.getElementById('objection-prev').addEventListener('click', () => changeObjectionPage(-1));
            document.getElementById('objection-next').addEventListener('click', () => changeObjectionPage(1));

            document.getElementById('start-quiz-btn').addEventListener('click', startQuiz);
            document.getElementById('next-q-btn').addEventListener('click', nextQuestion);
            document.getElementById('restart-quiz-btn').addEventListener('click', () => { currentQIndex = 0; score = 0; startQuiz(); });

        function changeObjectionPage(direction) {
            const data = getShared('objections');
            if (!data.length) return;
            const totalPages = Math.max(1, Math.ceil(data.length / objectionsPerPage));
            currentObjectionPage = Math.min(Math.max(currentObjectionPage + direction, 0), totalPages - 1);
            renderObjections();
        }

        function renderObjections() {
            const p = getPage();
            const data = getShared('objections');
            const totalItems = data.length;
            const totalPages = Math.max(1, Math.ceil(totalItems / objectionsPerPage));
            if (currentObjectionPage > totalPages - 1) currentObjectionPage = totalPages - 1;
            const start = currentObjectionPage * objectionsPerPage;
            const end = Math.min(start + objectionsPerPage, totalItems);
            const pageItems = data.slice(start, end);
            setText('objection-current-page', currentObjectionPage + 1);
            setText('objection-total-pages', totalPages);
            setText('objection-range', totalItems ? interpolate(p.objections.rangeTemplate, {start: start + 1, end, total: totalItems}) : p.objections.empty);
            document.getElementById('objection-prev').disabled = currentObjectionPage === 0;
            document.getElementById('objection-next').disabled = currentObjectionPage >= totalPages - 1;
            if (!pageItems.length) { setHTML('objection-accordion', `<div class="text-center text-gray-500 dark:text-gray-400 py-6">${escapeHtml(p.objections.empty)}</div>`); return; }
            setHTML('objection-accordion', pageItems.map((obj, localIdx) => {
                const itemNumber = start + localIdx + 1;
                return `<div class="accordion-item bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                    <button type="button" class="w-full text-left p-5 font-bold text-gray-900 dark:text-white flex justify-between items-center focus:outline-none" onclick="this.parentElement.classList.toggle('active')">
                        <span class="flex items-start gap-3"><span class="text-asn-red shrink-0 font-oswald">${itemNumber}.</span><span>${escapeHtml(obj.q)}</span></span>
                        <i class="fa-solid fa-chevron-down chevron transition-transform shrink-0 ml-4"></i>
                    </button>
                    <div class="accordion-content bg-gray-50 dark:bg-gray-700/50 px-5 pb-0 text-sm text-gray-700 dark:text-gray-300 border-t border-gray-100 dark:border-gray-700">
                        <p class="pb-5"><strong class="text-asn-red">${escapeHtml(p.objections.answerLabel)}</strong> ${escapeHtml(obj.a)}</p>
                    </div>
                </div>`;
            }).join(''));
        }

            const categories = getShared('qaCategories');
            if (!categories.some(cat => cat.id === activeFilter)) activeFilter = 'all';
            document.getElementById('qa-filters').innerHTML = categories.map(cat => `<button onclick="filterQA('${cat.id}')" class="qa-filter-btn px-4 py-2 rounded-full text-sm font-semibold border ${cat.id === activeFilter ? 'bg-asn-red text-white border-asn-red' : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-600 hover:border-asn-red dark:hover:border-asn-red'} transition" data-id="${cat.id}">${escapeHtml(cat.name)}</button>`).join('');
        }

        function filterQA(catId) {
            activeFilter = catId;
            renderQAFilters();
            renderQAList();
        }

        function renderQAList() {
            const p = getPage();
            const noResult = document.getElementById('qa-no-result');
            let filteredData = getShared('qa');
            if (activeFilter !== 'all') filteredData = filteredData.filter(item => item.cat === activeFilter);
            if (currentSearchTerm.trim() !== '') {
                const term = currentSearchTerm.trim().toLowerCase();
                filteredData = filteredData.filter(item => item.q.toLowerCase().includes(term) || item.a.toLowerCase().includes(term));
            }
            if (filteredData.length === 0) { setHTML('qa-container', ''); noResult.classList.remove('hidden'); return; }
            noResult.classList.add('hidden');
            setHTML('qa-container', filteredData.map(item => {
                const displayQ = highlightText(item.q, currentSearchTerm);
                const displayA = highlightText(item.a, currentSearchTerm);
                return `<div class="accordion-item bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                    <button class="w-full text-left p-4 md:p-5 font-bold text-gray-900 dark:text-white flex justify-between items-center focus:outline-none" onclick="this.parentElement.classList.toggle('active')">
                        <span class="flex items-start gap-3"><span class="text-gray-400 shrink-0 font-oswald w-6">Q${item.id}.</span><span>${displayQ}</span></span>
                        <i class="fa-solid fa-chevron-down chevron transition-transform shrink-0 ml-4 text-gray-400"></i>
                    </button>
                    <div class="accordion-content bg-gray-50 dark:bg-gray-700/50 px-5 pb-0 text-sm text-gray-700 dark:text-gray-300 border-t border-gray-100 dark:border-gray-700">
                        <p class="pb-5 pl-9"><strong class="text-asn-red">${escapeHtml(p.qa.answerLabel)}</strong> ${displayA}</p>
                    </div>
                </div>`;
            }).join(''));
        }

        window.filterQA = filterQA;
        window.renderQAList = renderQAList;

        function updateQuizStaticText() {
            const p = getPage();
            const total = getShared('quiz').length;
            setText('quiz-subtitle', interpolate(p.quiz.subtitleTemplate, {total}));
            setText('quiz-intro-title', p.quiz.introTitle);
            setText('start-quiz-btn', p.quiz.start);
            setText('quiz-question-prefix', p.quiz.questionPrefix);
            setText('quiz-total-count', total);
            setText('quiz-result-title', p.quiz.resultTitle);
            setText('quiz-score-label', p.quiz.scoreLabel);
            setText('quiz-total-result', total);
            setText('restart-quiz-btn', p.quiz.restart);
            const nextBtn = document.getElementById('next-q-btn');
            if (nextBtn) nextBtn.innerHTML = `${currentQIndex === total - 1 && answered ? p.quiz.viewResult : p.quiz.next} <i class="fa-solid ${currentQIndex === total - 1 && answered ? 'fa-flag-checkered' : 'fa-arrow-right'} ml-2"></i>`;
        }

        function startQuiz() {
            currentQIndex = currentQIndex >= getShared('quiz').length ? 0 : currentQIndex;
            if (document.getElementById('quiz-result').classList.contains('hidden')) { score = 0; currentQIndex = 0; }
            answered = false; lastSelectedIdx = null; quizActive = true;
            document.getElementById('quiz-intro').classList.add('hidden');
            document.getElementById('quiz-result').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            updateProgress(); renderQuestion();
        }

        function renderQuestion() {
            const p = getPage();
            const quizData = getShared('quiz');
            const qData = quizData[currentQIndex];
            quizActive = !answered;
            updateQuizStaticText();
            document.getElementById('next-q-btn').classList.toggle('hidden', !answered);
            document.getElementById('feedback-area').classList.toggle('hidden', !answered);
            setText('current-q-num', currentQIndex + 1);
            setText('question-text', qData ? qData.q : p.quiz.questionPlaceholder);
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';
            if (!qData) return;
            qData.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded border-2 border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 hover:border-asn-red hover:bg-red-50 dark:hover:bg-red-900/20 transition font-medium focus:outline-none';
                btn.innerHTML = `<span class="inline-block w-6 font-bold text-gray-400">${String.fromCharCode(65 + idx)}.</span> ${escapeHtml(opt)}`;
                btn.onclick = () => checkAnswer(idx);
                optsContainer.appendChild(btn);
            });
            if (answered) applyAnswerState();
        }

        function checkAnswer(selectedIdx) {
            if (!quizActive) return;
            quizActive = false; answered = true; lastSelectedIdx = selectedIdx;
            const qData = getShared('quiz')[currentQIndex];
            if (selectedIdx === qData.ans) score++;
            renderQuestion();
        }

        function applyAnswerState() {
            const p = getPage();
            const qData = getShared('quiz')[currentQIndex];
            const isCorrect = lastSelectedIdx === qData.ans;
            const buttons = document.getElementById('options-container').children;
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('hover:border-asn-red', 'hover:bg-red-50', 'dark:hover:bg-red-900/20');
                if (i === qData.ans) buttons[i].classList.add('border-green-500', 'bg-green-50', 'dark:bg-green-900/20', 'text-green-800', 'dark:text-green-300');
                else if (i === lastSelectedIdx && !isCorrect) buttons[i].classList.add('border-red-500', 'bg-red-50', 'dark:bg-red-900/20', 'text-red-800', 'dark:text-red-300');
                else buttons[i].classList.add('opacity-50');
            }
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackTitle = document.getElementById('feedback-title');
            feedbackArea.classList.remove('hidden', 'bg-green-100', 'dark:bg-green-900/40', 'bg-red-100', 'dark:bg-red-900/40', 'text-green-800', 'dark:text-green-300', 'text-red-800', 'dark:text-red-300');
            if (isCorrect) { feedbackArea.classList.add('bg-green-100', 'dark:bg-green-900/40', 'text-green-800', 'dark:text-green-300'); feedbackTitle.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${p.quiz.correct}`; }
            else { feedbackArea.classList.add('bg-red-100', 'dark:bg-red-900/40', 'text-red-800', 'dark:text-red-300'); feedbackTitle.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> ${p.quiz.wrong}`; }
            setText('feedback-text', qData.exp);
            const nextBtn = document.getElementById('next-q-btn');
            nextBtn.classList.remove('hidden');
            if (currentQIndex === getShared('quiz').length - 1) {
                nextBtn.innerHTML = `${p.quiz.viewResult} <i class="fa-solid fa-flag-checkered ml-2"></i>`;
                nextBtn.classList.add('bg-asn-red', 'hover:bg-red-700');
                nextBtn.classList.remove('bg-gray-800', 'dark:bg-gray-600');
            } else {
                nextBtn.innerHTML = `${p.quiz.next} <i class="fa-solid fa-arrow-right ml-2"></i>`;
                nextBtn.classList.remove('bg-asn-red', 'hover:bg-red-700');
                nextBtn.classList.add('bg-gray-800', 'dark:bg-gray-600');
            }
        }

        function nextQuestion() {
            currentQIndex++; answered = false; lastSelectedIdx = null; updateProgress();
            if (currentQIndex < getShared('quiz').length) renderQuestion(); else showResult();
        }

        function updateProgress() {
            const percent = (currentQIndex / getShared('quiz').length) * 100;
            document.getElementById('quiz-progress').style.width = `${percent}%`;
        }

        function showResult() {
            const p = getPage();
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('quiz-result').classList.remove('hidden');
            setText('final-score', score);
            const msgEl = document.getElementById('result-message');
            const iconEl = document.getElementById('result-icon');
            if (score >= 8) { iconEl.innerText = '🏆'; msgEl.innerHTML = `<span class='text-green-600 dark:text-green-400'>${p.quiz.messages.high}</span>`; }
            else if (score >= 5) { iconEl.innerText = '💪'; msgEl.innerHTML = `<span class='text-yellow-600 dark:text-yellow-400'>${p.quiz.messages.mid}</span>`; }
            else { iconEl.innerText = '📚'; msgEl.innerHTML = `<span class='text-red-600 dark:text-red-400'>${p.quiz.messages.low}</span>`; }
            updateQuizStaticText();
            const nextBtn = document.getElementById('next-q-btn');
            nextBtn.innerHTML = `${p.quiz.next} <i class="fa-solid fa-arrow-right ml-2"></i>`;
            nextBtn.classList.remove('bg-asn-red', 'hover:bg-red-700');
            nextBtn.classList.add('bg-gray-800', 'dark:bg-gray-600');
        }
    </script>
</body>
</html>
