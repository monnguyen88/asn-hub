    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function colorClasses(color) {
      const map = {
        red: 'bg-red-100 text-red-700',
        orange: 'bg-orange-100 text-orange-700',
        emerald: 'bg-emerald-100 text-emerald-700',
        blue: 'bg-blue-100 text-blue-700'
      };
      return map[color] || map.red;
    }

      nav.innerHTML = PAGE_KEYS.map(page => `

          ${escapeHTML(labels[page])}
        </button>
      `).join('');

      nav.querySelectorAll('[data-page]').forEach(btn => {
        btn.addEventListener('click', () => showPage(btn.dataset.page));
      });

      const mobileSelect = document.getElementById('mobilePageSelect');
      if (mobileSelect) {
        mobileSelect.innerHTML = PAGE_KEYS.map(page => `

    }

              <p class="text-slate-600 mb-5 leading-relaxed">${escapeHTML(video.body)}</p>
              <ul class="space-y-3 text-slate-700 font-semibold">
                ${video.points.map(item => `<li class="flex gap-3"><span class="text-blue-600 font-black">✓</span><span>${escapeHTML(item)}</span></li>`).join('')}
              </ul>
            </div>
          </div>
        </section>
      `;
    }

    function renderProductCard(key) {
      const text = i18n[currentLang];
      const card = text.cards[key];
      return `
        <article class="product-card bg-white border border-slate-200 rounded-3xl p-5 shadow-sm">
          <div class="h-12 w-12 rounded-2xl ${colorClasses(card.color)} flex items-center justify-center text-2xl mb-4">${escapeHTML(card.icon)}</div>
          <h3 class="text-xl font-black mb-2">${escapeHTML(card.title)}</h3>
          <p class="text-slate-600 mb-4">${escapeHTML(card.desc)}</p>
          <div class="space-y-2 text-sm mb-5">
            ${card.bullets.map(item => `<div class="font-bold">• ${escapeHTML(item)}</div>`).join('')}
          </div>
          <button type="button" data-page="${key}" class="card-btn w-full bg-slate-900 text-white rounded-2xl py-3 font-black hover:bg-red-600">${escapeHTML(text.home.detailBtn)}</button>
        </article>
      `;
    }

    function renderInfoBox(title, body) {
      return `
        <div class="bg-white border border-slate-200 rounded-3xl p-5 shadow-sm">
          <h3 class="text-lg font-black mb-3">${escapeHTML(title)}</h3>
          <p class="text-sm text-slate-600">${escapeHTML(body)}</p>
        </div>
      `;
    }

    function renderProductPage(key) {
      const text = i18n[currentLang];
      const labels = text.labels;
      const product = text.products[key];
      return `
        <section id="page-${key}" class="page fade-in">
          <div class="mb-6">
            <button type="button" data-page="home" class="back-btn mb-4 text-sm font-bold text-red-600 hover:underline">${escapeHTML(labels.back)}</button>
            <h2 class="text-3xl lg:text-4xl font-black">${escapeHTML(product.title)}</h2>
            <p class="text-slate-600 mt-2 max-w-3xl">${escapeHTML(product.subtitle)}</p>
          </div>
          <div class="grid lg:grid-cols-3 gap-5 mb-6">
            <div class="lg:col-span-2 text-white rounded-3xl p-6 shadow-lg bg-gradient-to-br ${escapeHTML(product.gradient)}">
              <div class="text-sm uppercase tracking-widest text-white/70 font-black mb-3">${escapeHTML(labels.position)}</div>
              <h3 class="text-2xl lg:text-3xl font-black mb-3">${escapeHTML(product.positionTitle)}</h3>
              <p class="text-white/90 leading-relaxed">${escapeHTML(product.positionBody)}</p>
            </div>
            <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
              <div class="text-sm uppercase tracking-widest text-slate-400 font-black mb-3">${escapeHTML(product.sideTitle)}</div>
              <ul class="space-y-3 text-sm text-slate-700">
                ${product.side.map(item => `<li>• ${escapeHTML(item)}</li>`).join('')}
              </ul>
            </div>
          </div>
          ${renderProductBlocks(product, labels)}
          <div class="grid lg:grid-cols-3 gap-5 mt-6">
            ${product.insights.map(item => renderInfoBox(item.title, item.body)).join('')}
          </div>
          ${renderSalesPlaybook(product.playbook)}
          ${renderPricing(key, labels)}
          ${renderObjections(text)}
        </section>
      `;
    }


    function renderDemandSection(text) {
      const demand = text.demand;
      return `
        <section class="mb-6 bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
          <div class="max-w-4xl mb-6">
            <div class="text-sm uppercase tracking-widest text-red-500 font-black mb-2">Demand Creation</div>
            <h3 class="text-2xl lg:text-3xl font-black mb-2">${escapeHTML(demand.title)}</h3>
            <p class="text-slate-600">${escapeHTML(demand.subtitle)}</p>
          </div>
          <div class="grid md:grid-cols-2 xl:grid-cols-4 gap-4 mb-6">
            ${demand.cards.map(card => `
              <article class="rounded-2xl border border-slate-200 p-4 bg-slate-50">
                <div class="h-9 w-9 rounded-full bg-red-600 text-white flex items-center justify-center font-black mb-3">${escapeHTML(card.step)}</div>
                <h4 class="font-black text-lg mb-2">${escapeHTML(card.title)}</h4>
                <p class="text-sm text-slate-600">${escapeHTML(card.body)}</p>
              </article>
            `).join('')}
          </div>
          <div class="grid lg:grid-cols-2 gap-4 mb-6">
            ${demand.machines.map(machine => `
              <article class="rounded-2xl border border-slate-200 p-5">
                <div class="text-xs uppercase tracking-widest text-slate-400 font-black mb-2">${escapeHTML(demand.machineTitle)}</div>
                <h4 class="text-xl font-black">${escapeHTML(machine.name)}</h4>
                <div class="inline-flex bg-red-50 text-red-700 rounded-full px-3 py-1 text-xs font-black my-3">${escapeHTML(machine.tag)}</div>
                <p class="text-sm text-slate-700">${escapeHTML(machine.body)}</p>
              </article>
            `).join('')}
          </div>
          <div class="grid lg:grid-cols-2 gap-4">
            <div class="rounded-2xl bg-slate-900 text-white p-5">
              <h4 class="text-xl font-black mb-3">${escapeHTML(demand.outcomeTitle)}</h4>
              <ul class="space-y-2 text-sm text-slate-200">
                ${demand.outcomes.map(item => `<li>✓ ${escapeHTML(item)}</li>`).join('')}
              </ul>
            </div>
            <div class="rounded-2xl bg-red-50 border border-red-100 p-5">
              <h4 class="text-xl font-black text-red-700 mb-3">${escapeHTML(demand.safetyTitle)}</h4>
              <p class="text-sm text-red-900 font-semibold">${escapeHTML(demand.safetyText)}</p>
            </div>
          </div>
        </section>
      `;
    }

    function renderSalesPlaybook(playbook) {
      if (!playbook) return '';
      return `
        <section class="mt-6 bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
          <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-3 mb-5">
            <div>
              <div class="text-sm uppercase tracking-widest text-red-500 font-black mb-2">Sales Playbook</div>
              <h3 class="text-2xl lg:text-3xl font-black">${escapeHTML(playbook.explainTitle)}</h3>
              <p class="text-slate-600 mt-2 max-w-4xl">${escapeHTML(playbook.explainIntro)}</p>
            </div>
          </div>
          <div class="grid lg:grid-cols-3 gap-5">
            <article class="rounded-2xl border border-slate-200 bg-slate-50 p-5">
              <h4 class="text-lg font-black mb-3">${escapeHTML(playbook.explainTitle)}</h4>
              <ul class="space-y-2 text-sm text-slate-700">
                ${playbook.explain.map(item => `<li>• ${escapeHTML(item)}</li>`).join('')}
              </ul>
            </article>
            <article class="rounded-2xl border border-red-100 bg-red-50 p-5">
              <h4 class="text-lg font-black text-red-700 mb-3">${escapeHTML(playbook.sellingTitle)}</h4>
              <ul class="space-y-2 text-sm text-red-950">
                ${playbook.selling.map(item => `<li>✓ ${escapeHTML(item)}</li>`).join('')}
              </ul>
            </article>
            <article class="rounded-2xl border border-slate-200 p-5">
              <h4 class="text-lg font-black mb-3">${escapeHTML(playbook.triggerTitle)}</h4>
              <ul class="space-y-2 text-sm text-slate-700">
                ${playbook.triggers.map(item => `<li>• ${escapeHTML(item)}</li>`).join('')}
              </ul>
            </article>
          </div>
          <div class="mt-5 rounded-2xl bg-slate-900 text-white p-5">
            <div class="text-xs uppercase tracking-widest text-red-200 font-black mb-2">${escapeHTML(playbook.closeTitle)}</div>
            <p class="font-semibold text-slate-100">${escapeHTML(playbook.close)}</p>
          </div>
        </section>
      `;
    }

    function renderProductBlocks(product, labels) {
      const blocks = Array.isArray(product.blocks) ? product.blocks : [];
      const isSingle = blocks.length === 1;
      const gridClass = isSingle ? 'grid grid-cols-1 gap-5' : 'grid lg:grid-cols-2 gap-5';
      return `
        <div class="${gridClass}">
          ${blocks.map(block => `
            <div class="${isSingle ? 'w-full' : ''}">
              ${renderProductBlock(block, labels)}
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderProductBlock(block, labels) {
      return `
        <article class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
          <div class="inline-flex bg-red-50 text-red-700 rounded-full px-3 py-1 text-xs font-black mb-4">${escapeHTML(block.tag)}</div>
          <h3 class="text-2xl font-black mb-5">${escapeHTML(block.title)}</h3>
          <div class="space-y-5">
            ${renderField(labels.audience, block.audience)}
            ${renderField(labels.benefits, block.benefits)}
            ${renderField(labels.usp, block.usp)}
            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
              <div class="text-xs uppercase tracking-widest text-red-500 font-black mb-1">${escapeHTML(labels.close)}</div>
              <p class="text-slate-800 font-semibold">${escapeHTML(block.close)}</p>
            </div>
          </div>
        </article>
      `;
    }

    function renderField(label, body) {
      return `
        <div>
          <div class="text-xs uppercase tracking-widest text-slate-400 font-black mb-1">${escapeHTML(label)}</div>
          <p class="text-slate-700">${escapeHTML(body)}</p>
        </div>
      `;
    }

    function renderPricing(key, labels) {
      const cards = key === 'fullbody'
        ? [
            { name: labels.combo50, price: '1,090,000', note: labels.combo50Note, hot: true },
            { name: labels.combo100, price: '990,000', note: labels.combo100Note, hot: false }
          ]
        : [
            { name: labels.single, price: '1,290,000', note: labels.singleNote, hot: false },
            { name: labels.combo12, price: '1,090,000', note: labels.combo12Note, hot: true },
            { name: labels.combo100, price: '990,000', note: labels.combo100Note, hot: false }
          ];
      return `
        <section class="mt-6 bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
          <h3 class="text-2xl font-black mb-4">${escapeHTML(labels.priceTitle)}</h3>
          <div class="grid ${key === 'fullbody' ? 'md:grid-cols-2' : 'md:grid-cols-3'} gap-4">
            ${cards.map(card => renderPriceCard(card, labels.perSession)).join('')}
          </div>
        </section>
      `;
    }

    function renderPriceCard(card, perSession) {
      const cls = card.hot ? 'rounded-2xl border border-red-200 bg-red-50 p-5' : 'rounded-2xl border border-slate-200 p-5';
      return `
        <div class="${cls}">
          <div class="font-black text-lg">${escapeHTML(card.name)}</div>
          <div class="text-2xl font-black text-red-600 mt-2">${escapeHTML(card.price)}</div>
          <div class="text-sm text-slate-500">${escapeHTML(perSession)}</div>
          <div class="mt-3 text-sm font-semibold">${escapeHTML(card.note)}</div>
        </div>
      `;
    }

    function renderObjections(text) {
      return `
        <section class="mt-6 grid lg:grid-cols-2 gap-5">
          <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
            <h3 class="text-2xl font-black mb-4">${escapeHTML(text.labels.objectionTitle)}</h3>
            <div class="space-y-4 text-sm">
              ${text.objections.map(item => `<div class="border-l-4 border-red-500 pl-4"><b>${escapeHTML(item.q)}</b><br>${escapeHTML(item.a)}</div>`).join('')}
            </div>
          </div>
          <div class="bg-slate-900 text-white rounded-3xl p-6 shadow-sm">
            <h3 class="text-2xl font-black mb-4">${escapeHTML(text.labels.staffReminder)}</h3>
            <p class="text-slate-200 mb-4">${escapeHTML(text.staffText)}</p>
            <div class="grid grid-cols-2 gap-3 text-sm font-bold">
              ${text.staffWords.map(word => `<div class="bg-white/10 rounded-2xl p-3">${escapeHTML(word)}</div>`).join('')}
            </div>
          </div>
        </section>
      `;
    }

    function attachPageEvents() {
      document.querySelectorAll('[data-page]').forEach(button => {
        button.addEventListener('click', () => showPage(button.dataset.page));
      });
    }

    function showPage(page, scroll = true) {
      if (!PAGE_KEYS.includes(page)) {
        console.warn('Unknown page:', page);
        return;
      }
      currentPage = page;
      renderApp();
      if (scroll) window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setLang(lang) {
      if (!i18n[lang]) {
        console.warn('Unknown language:', lang);
        return;
      }
      currentLang = lang;
      renderApp();
    }

    function runSelfTests() {
      const requiredLangs = ['vi', 'en'];
      const errors = [];
      requiredLangs.forEach(lang => {
        if (!i18n[lang]) errors.push(`Missing language: ${lang}`);
        PAGE_KEYS.forEach(page => {
          if (!i18n[lang].nav[page]) errors.push(`Missing nav ${lang}.${page}`);
        });
        if (!i18n[lang].demand) errors.push(`Missing demand section ${lang}`);
        if (!i18n[lang].home.values) errors.push(`Missing home core values ${lang}`);
        PRODUCT_KEYS.forEach(product => {
          if (!i18n[lang].products[product]) errors.push(`Missing product ${lang}.${product}`);
          if (i18n[lang].products[product] && !i18n[lang].products[product].playbook) errors.push(`Missing playbook ${lang}.${product}`);
          if (!i18n[lang].cards[product]) errors.push(`Missing card ${lang}.${product}`);
        });
      });
      if (typeof showPage !== 'function') errors.push('showPage is not defined');
      if (typeof setLang !== 'function') errors.push('setLang is not defined');
      if (errors.length) {
        console.error('Self-test failed:', errors);
      } else {
        console.info('Self-test passed: navigation, languages, and product data are ready.');
      }
    }

    window.showPage = showPage;
    window.setLang = setLang;

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.lang-btn').forEach(button => {
        button.addEventListener('click', () => setLang(button.dataset.lang));
      });
      renderApp();
      runSelfTests();
    });
  </script>
</body>
</html>
